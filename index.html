<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج المهني 2026 </title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background: #f3f6fb;
  font-family: Tahoma, Arial, sans-serif;
}

.container {
  width: 100%;
  max-width: 500px;
  min-height: 100vh;
  margin: 0 auto;
  background: white;
  padding: 35px 20px;
  text-align: center;
}

.logo {
  width: 140px;
  max-width: 100%;
  height: auto;
  margin-bottom: 20px;
}

h1 {
  color: #0b5394;
  font-size: 26px;
  margin: 10px 0;
}

p {
  color: #555;
  font-size: 18px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  text-align: center;
  border: 1px solid #bbb;
  border-radius: 10px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  background: #0078d4;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #005ea8;
}

#result {
  margin-top: 25px;
  font-size: 20px;
  font-weight: bold;
}

#result a {
  color: #0078d4;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <img src="X1.jpg" alt="شعار" class="logo">

  <h1> نتائج الطلاب 2026</h1>

  <p>أدخل رقم الطالب لمعرفة النتيجة</p>

  <input
    type="text"
    id="studentNumber"
    placeholder="مثال: 1024011130005"
    maxlength="13"
    inputmode="numeric"
    onkeydown="if(event.key === 'Enter') searchResult();"
  >

  <button onclick="searchResult()">بحث</button>

  <div id="result"></div>

</div>

<script>
function searchResult() {
  var studentNumber = document.getElementById("studentNumber").value.trim();
  var resultBox = document.getElementById("result");

  resultBox.innerHTML = "";

  if (studentNumber === "") {
    resultBox.innerHTML = "يرجى إدخال رقم الطالب";
    return;
  }

  if (!/^[0-9]+$/.test(studentNumber)) {
    resultBox.innerHTML = "رقم الطالب يجب أن يحتوي على أرقام فقط";
    return;
  }

  var pdfUrl =
    "https://studentresults2026.blob.core.windows.net/student-results/" +
    studentNumber +
    ".pdf";

  resultBox.innerHTML =
    "<a href='" + pdfUrl + "' target='_blank'>عرض النتيجة PDF</a>";
}
</script>

</body>
</html>
