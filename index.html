<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>برنامج نتائج الطلاب</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f2f5f9;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }
    input, button {
      width: 90%;
      padding: 12px;
      font-size: 18px;
      margin: 10px 0;
      border-radius: 8px;
    }
    button {
      background: #0078d4;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    a {
      color: #0078d4;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>برنامج نتائج الطلاب 2026</h1>
  <p>أدخل رقم الطالب لمعرفة النتيجة</p>

  <input type="text" id="studentNumber" placeholder="مثال: 1024011130005">
  <button onclick="searchResult()">بحث</button>

  <div id="result"></div>
</div>

<script>
function searchResult() {
  var number = document.getElementById("studentNumber").value.trim();
  var resultBox = document.getElementById("result");

  if (number === "") {
    resultBox.innerHTML = "يرجى إدخال رقم الطالب";
    return;
  }

  var pdfUrl =
    "https://studentresults2026.blob.core.windows.net/student-results/"
    + number + ".pdf";

  resultBox.innerHTML =
    "<a href='" + pdfUrl + "' target='_blank'>اضغط هنا لعرض النتيجة</a>";
}
</script>

</body>
</html>
