<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطلبة المهني 2026</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background: #f3f6fb;
  font-family: Tahoma, Arial, sans-serif;
}

.container {
  width: 100%;
  max-width: 500px;
  min-height: 100vh;
  margin: 0 auto;
  background: white;
  padding: 30px 20px;
  text-align: center;
}

.logo {
  width: 140px;
  max-width: 100%;
  height: auto;
  margin-bottom: 15px;
}

h1 {
  color: #0b5394;
  font-size: 22px;
  margin: 8px 0;
}

p {
  color: #555;
  font-size: 18px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  text-align: center;
  border: 1px solid #bbb;
  border-radius: 10px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: #0078d4;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #005ea8;
}

#message {
  margin-top: 18px;
  font-size: 18px;
  font-weight: bold;
  color: #333;
}

#pdfPage {
  display: none;
  width: 100%;
  height: 100vh;
  background: white;
}

#pdfViewer {
  width: 100%;
  height: calc(100vh - 55px);
  border: none;
  display: block;
}

.backBtn {
  height: 55px;
  margin: 0;
  border-radius: 0;
  background: #0b5394;
}
</style>
</head>

<body>

<div class="container" id="mainPage">

  <img src="X1.jpg" alt="شعار" class="logo">

  <h1>وزارة التربية</h1>
  <h1>المديرية العامة للتعليم المهني</h1>
  <h1>نتائج الطلاب المهني 2026</h1>

  <p>أدخل رقم الطالب لمعرفة النتيجة</p>

  <input
    type="text"
    id="studentNumber"
    placeholder="مثال: 1024011130005"
    maxlength="13"
    inputmode="numeric"
  >

  <button onclick="viewResult()">عرض النتيجة</button>
  <button onclick="downloadResult()">تحميل النتيجة</button>

  <div id="message"></div>

</div>

<div id="pdfPage">
  <button class="backBtn" onclick="backToMain()">رجوع</button>
  <iframe id="pdfViewer"></iframe>
</div>

<script>
function getPdfUrl() {
  var studentNumber = document.getElementById("studentNumber").value.trim();
  var message = document.getElementById("message");

  message.innerHTML = "";

  if (studentNumber === "") {
    message.innerHTML = "يرجى إدخال رقم الطالب";
    return null;
  }

  if (!/^[0-9]+$/.test(studentNumber)) {
    message.innerHTML = "رقم الطالب يجب أن يحتوي على أرقام فقط";
    return null;
  }

  return "https://studentresults2026.blob.core.windows.net/student-results/" +
         studentNumber +
         ".pdf";
}

function viewResult() {
  var pdfUrl = getPdfUrl();

  if (pdfUrl === null) {
    return;
  }

  document.getElementById("mainPage").style.display = "none";
  document.getElementById("pdfPage").style.display = "block";
  document.getElementById("pdfViewer").src = pdfUrl;
}

function backToMain() {
  document.getElementById("pdfPage").style.display = "none";
  document.getElementById("pdfViewer").src = "";
  document.getElementById("mainPage").style.display = "block";
}

function downloadResult() {
  var pdfUrl = getPdfUrl();

  if (pdfUrl === null) {
    return;
  }

  window.open(pdfUrl, "_blank");
}
</script>

</body>
</html>
