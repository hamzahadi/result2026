<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطلبة المهني 2026</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f3f6fb;
  font-family: Tahoma, Arial, sans-serif;
}

.container {
  width: 100%;
  max-width: 500px;
  min-height: 100vh;
  margin: 0 auto;
  background: #fff;
  padding: 30px 20px;
  text-align: center;
}

.logo {
  width: 140px;
  max-width: 100%;
  margin-bottom: 15px;
}

h1 {
  color: #0b5394;
  font-size: 22px;
  margin: 8px 0;
}

p {
  color: #555;
  font-size: 18px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  text-align: center;
  border: 1px solid #bbb;
  border-radius: 10px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: #0078d4;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #005ea8;
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

#message {
  margin-top: 18px;
  font-size: 18px;
  font-weight: bold;
}

#loading {
  display: none;
  margin-top: 15px;
  font-size: 18px;
  color: #0b5394;
  font-weight: bold;
}

#pdfPage {
  display: none;
  width: 100%;
  height: 100vh;
  background: #fff;
}

#pdfViewer {
  width: 100%;
  height: calc(100vh - 55px);
  border: none;
}

.backBtn {
  height: 55px;
  margin: 0;
  border-radius: 0;
  background: #0b5394;
}
</style>
</head>

<body>

<div class="container" id="mainPage">

  <img src="X1.jpg" alt="شعار" class="logo">

  <h1>وزارة التربية</h1>
  <h1>المديرية العامة للتعليم المهني</h1>
  <h1>نتائج الطلاب المهني 2026</h1>

  <p>أدخل رقم الطالب لمعرفة النتيجة</p>

  <input
    type="text"
    id="studentNumber"
    placeholder="مثال: 1011112121"
    maxlength="13"
    inputmode="numeric"
    autocomplete="off"
  >

  <button id="viewBtn" onclick="viewResult()">عرض النتيجة</button>
  <button id="downloadBtn" onclick="downloadResult()">تحميل النتيجة</button>

  <div id="loading">جاري فتح النتيجة...</div>
  <div id="message"></div>

</div>

<div id="pdfPage">
  <button class="backBtn" onclick="backToMain()">رجوع</button>
  <iframe id="pdfViewer"></iframe>
</div>

<script>
const studentInput = document.getElementById("studentNumber");
const message = document.getElementById("message");
const loading = document.getElementById("loading");
const viewBtn = document.getElementById("viewBtn");
const downloadBtn = document.getElementById("downloadBtn");
const mainPage = document.getElementById("mainPage");
const pdfPage = document.getElementById("pdfPage");
const pdfViewer = document.getElementById("pdfViewer");

studentInput.addEventListener("input", function () {
  this.value = this.value.replace(/[^0-9]/g, "");
});

studentInput.addEventListener("keydown", function (event) {
  if (event.key === "Enter") {
    viewResult();
  }
});

function showMessage(text, color = "#333") {
  message.textContent = text;
  message.style.color = color;
}

function setLoading(status) {
  loading.style.display = status ? "block" : "none";
  viewBtn.disabled = status;
  downloadBtn.disabled = status;
}

function getStudentNumber() {
  const number = studentInput.value.trim();

  if (number === "") {
    showMessage("يرجى إدخال الرقم السري للطالب", "red");
    return null;
  }

  if (!/^[0-9]+$/.test(number)) {
    showMessage("رقم الطالب السري يجب أن يحتوي على أرقام فقط", "red");
    return null;
  }

  if (number.length !== 13) {
    showMessage("رقم الطالب السري يجب أن يتكون من 10 رقماً", "red");
    return null;
  }

  return number;
}

function getPdfUrl() {
  const studentNumber = getStudentNumber();

  if (!studentNumber) {
    return null;
  }

  return "https://studentresults2026.blob.core.windows.net/student-results/" +
         encodeURIComponent(studentNumber) +
         ".pdf";
}

function viewResult() {
  const pdfUrl = getPdfUrl();

  if (!pdfUrl) {
    return;
  }

  showMessage("");
  setLoading(true);

  setTimeout(function () {
    pdfViewer.src = pdfUrl;
    mainPage.style.display = "none";
    pdfPage.style.display = "block";
    setLoading(false);
  }, 300);
}

function downloadResult() {
  const pdfUrl = getPdfUrl();

  if (!pdfUrl) {
    return;
  }

  showMessage("");
  window.open(pdfUrl, "_blank");
}

function backToMain() {
  pdfViewer.src = "";
  pdfPage.style.display = "none";
  mainPage.style.display = "block";
}

window.addEventListener("offline", function () {
  showMessage("لا يوجد اتصال بالإنترنت", "red");
});
</script>

</body>
</html>
